<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agent Collective</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a28;
    --border: #2a2a3a; --text: #e2e8f0; --muted: #64748b;
    --accent: #7c3aed;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; overflow: hidden; }
  #root { width: 100vw; height: 100vh; display: flex; flex-direction: column; }

  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 16px; height: 44px; flex-shrink: 0; }
  .header h1 { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .badge-green { background: #052e16; color: #4ade80; border: 1px solid #166534; }
  .badge-red { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
  .uptime { color: var(--muted); font-size: 10px; margin-left: auto; }

  .tabs { display: flex; gap: 1px; padding: 0 16px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { padding: 8px 16px; cursor: pointer; color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; border-bottom: 2px solid transparent; transition: all .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* STREAMS */
  .streams { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; flex: 1; overflow: hidden; background: var(--border); }
  .agent-panel { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
  .agent-header { padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .agent-dot { width: 8px; height: 8px; border-radius: 50%; }
  .agent-name { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .agent-model { color: var(--muted); font-size: 9px; }
  .agent-loop { margin-left: auto; color: var(--muted); font-size: 9px; }
  .agent-phase { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; letter-spacing: 1px; }
  .phase-reason { background: #1e1b4b; color: #a78bfa; }
  .phase-plan { background: #052e16; color: #4ade80; }
  .phase-act { background: #431407; color: #fb923c; }
  .phase-observe { background: #0c1a2e; color: #38bdf8; }
  .phase-memory { background: #1a0533; color: #e879f9; }
  .phase-system { background: #1c1917; color: #a8a29e; }
  .agent-feed { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  .agent-feed::-webkit-scrollbar { width: 4px; }
  .agent-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .thought-entry { border-left: 2px solid; padding: 6px 8px; font-size: 11px; line-height: 1.5; border-radius: 0 4px 4px 0; }
  .thought-ts { color: var(--muted); font-size: 9px; margin-bottom: 3px; }
  .publish-badge { display: inline-block; background: #1e1b4b; color: #a78bfa; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-bottom: 3px; }

  /* TOOL LOG */
  .tool-log { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .tool-log-header { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
  .tool-list { flex: 1; overflow-y: auto; }
  .tool-entry { display: grid; grid-template-columns: 80px 70px 120px 1fr; gap: 8px; padding: 7px 16px; border-bottom: 1px solid #0f0f18; align-items: start; font-size: 11px; }
  .tool-entry:hover { background: var(--bg2); }
  .tool-time { color: var(--muted); font-size: 10px; }
  .tool-agent { font-weight: 700; }
  .tool-type { padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; text-align: center; }
  .tool-search { background: #0c1a2e; color: #38bdf8; }
  .tool-skill { background: #1a0533; color: #e879f9; }
  .tool-script { background: #431407; color: #fb923c; }
  .tool-summary { color: #94a3b8; line-height: 1.4; }

  /* BUS FEED */
  .bus-feed { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .bus-entry { display: grid; grid-template-columns: 80px 80px 1fr; gap: 10px; padding: 8px 16px; border-bottom: 1px solid #0f0f18; font-size: 11px; align-items: start; }
  .bus-entry:hover { background: var(--bg2); }
  .bus-agent { font-weight: 700; }
  .bus-msg { color: var(--text); line-height: 1.5; }
  .bus-concepts { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
  .concept-tag { padding: 1px 5px; border-radius: 3px; font-size: 9px; background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }

  /* INJECT */
  .inject-bar { padding: 8px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; background: var(--bg2); }
  .inject-input { flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 11px; outline: none; }
  .inject-input:focus { border-color: var(--accent); }
  .inject-btn { background: var(--accent); color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 700; }
  .inject-btn:hover { background: #6d28d9; }

  /* CONCEPT MAP */
  .map-container { flex: 1; position: relative; overflow: hidden; }
  .map-container svg { width: 100%; height: 100%; }
  .node text { font-size: 11px; fill: var(--text); pointer-events: none; }
  .node circle { cursor: pointer; }
  .link { stroke: #2a2a3a; stroke-opacity: 0.6; }
  .map-legend { position: absolute; top: 12px; right: 12px; background: rgba(10,10,15,0.9); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; font-size: 10px; }
  .map-legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .map-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* HEATMAP */
  .heatmap-container { flex: 1; overflow: hidden; padding: 16px; }
  .heatmap-container svg { width: 100%; height: 100%; }

  /* MEMORY VIEWER */
  .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; flex: 1; overflow: hidden; background: var(--border); }
  .memory-panel { background: var(--bg); overflow: hidden; display: flex; flex-direction: column; }
  .memory-body { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; line-height: 1.6; white-space: pre-wrap; color: #94a3b8; }
  .memory-tier { color: #a78bfa; font-weight: 700; }
  .memory-entry { color: var(--text); }
  .tier-stats { display: flex; gap: 8px; padding: 6px 12px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .tier-stat { font-size: 9px; color: var(--muted); }
  .tier-count { color: var(--text); font-weight: 700; }

  /* DIVERGENCE */
  .divergence-container { flex: 1; overflow: hidden; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .divergence-pair { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
  .divergence-title { font-size: 11px; font-weight: 700; margin-bottom: 8px; color: var(--muted); }
  .divergence-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 10px; }
  .divergence-concept { width: 120px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .divergence-bar-wrap { flex: 1; height: 12px; background: var(--bg3); border-radius: 6px; overflow: hidden; position: relative; }
  .divergence-agree { position: absolute; left: 50%; top: 0; height: 100%; background: #166534; transform-origin: left; }
  .divergence-disagree { position: absolute; right: 50%; top: 0; height: 100%; background: #7f1d1d; transform-origin: right; }
  .divergence-score { width: 30px; text-align: right; color: var(--muted); }

  /* SCROLLBARS */
  .tool-list::-webkit-scrollbar, .bus-feed::-webkit-scrollbar, .memory-body::-webkit-scrollbar { width: 4px; }
  .tool-list::-webkit-scrollbar-thumb, .bus-feed::-webkit-scrollbar-thumb, .memory-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const AGENT_COLORS = {
  qwen:     "#7C3AED",
  glm:      "#0EA5E9",
  llama:    "#10B981",
  deepseek: "#F59E0B",
  operator: "#EF4444",
};

const PHASE_LABELS = {
  reason:  "REASON",
  plan:    "PLAN",
  act:     "ACT",
  observe: "OBSERVE",
  memory:  "MEMORY",
  system:  "SYS",
};

function fmt(ts) {
  return new Date(ts * 1000).toLocaleTimeString("en-CA", { hour12: false });
}

// ── WebSocket hook ────────────────────────────────────────────────────────────
function useWebSocket(url) {
  const [events, setEvents]     = useState([]);
  const [graph, setGraph]       = useState(null);
  const [connected, setConnected] = useState(false);
  const ws = useRef(null);

  const connect = useCallback(() => {
    if (ws.current?.readyState === WebSocket.OPEN) return;
    ws.current = new WebSocket(url);
    ws.current.onopen  = () => setConnected(true);
    ws.current.onclose = () => { setConnected(false); setTimeout(connect, 3000); };
    ws.current.onerror = () => ws.current.close();
    ws.current.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "event") {
        setEvents(prev => {
          const next = [...prev, msg.data];
          return next.length > 500 ? next.slice(-500) : next;
        });
      } else if (msg.type === "graph") {
        setGraph(msg.data);
      }
    };
  }, [url]);

  useEffect(() => { connect(); return () => ws.current?.close(); }, [connect]);
  return { events, graph, connected, ws };
}

// ── Status hook ────────────────────────────────────────────────────────────────
function useStatus() {
  const [status, setStatus] = useState(null);
  useEffect(() => {
    const poll = async () => {
      try {
        const r = await fetch("/status");
        setStatus(await r.json());
      } catch {}
    };
    poll();
    const t = setInterval(poll, 5000);
    return () => clearInterval(t);
  }, []);
  return status;
}

// ── Graph hook ──────────────────────────────────────────────────────────────
function useGraph() {
  const [graph, setGraph] = useState(null);
  useEffect(() => {
    const poll = async () => {
      try {
        const r = await fetch("/graph");
        setGraph(await r.json());
      } catch {}
    };
    poll();
    const t = setInterval(poll, 3000);
    return () => clearInterval(t);
  }, []);
  return graph;
}

// ── Memory hook ────────────────────────────────────────────────────────────
function useMemory(agentId) {
  const [memory, setMemory] = useState(null);
  useEffect(() => {
    if (!agentId) return;
    const poll = async () => {
      try {
        const r = await fetch(`/memory/${agentId}`);
        setMemory(await r.json());
      } catch {}
    };
    poll();
    const t = setInterval(poll, 5000);
    return () => clearInterval(t);
  }, [agentId]);
  return memory;
}

// ── Agent Panel ────────────────────────────────────────────────────────────────
function AgentPanel({ agentId, agentEvents, status }) {
  const feedRef = useRef(null);
  const color   = AGENT_COLORS[agentId] || "#888";
  const latest  = agentEvents[agentEvents.length - 1];
  const phase   = latest?.phase || "system";
  const loop    = status?.agents?.[agentId]?.loop_count || 0;
  const model   = status?.agents?.[agentId]?.model || "";

  useEffect(() => {
    if (feedRef.current) {
      feedRef.current.scrollTop = feedRef.current.scrollHeight;
    }
  }, [agentEvents]);

  return (
    <div className="agent-panel">
      <div className="agent-header">
        <div className="agent-dot" style={{ background: color }}/>
        <span className="agent-name" style={{ color }}>{agentId}</span>
        <span className="agent-model">{model.split(":")[0]}</span>
        <span className={`agent-phase phase-${phase}`}>{PHASE_LABELS[phase] || phase}</span>
        <span className="agent-loop">#{loop}</span>
      </div>
      <div className="agent-feed" ref={feedRef}>
        {agentEvents.slice(-80).map((e, i) => {
            // Parse thought if it's a raw JSON string from the agent
            let displayText = e.publish || e.thought || "";
            if (displayText.startsWith("{")) {
              try {
                const parsed = JSON.parse(displayText);
                displayText = parsed.thought || parsed.publish || displayText;
              } catch {}
            }
            return (
          <div key={i} className="thought-entry"
               style={{ borderLeftColor: color, background: `${color}08` }}>
            <div className="thought-ts">{fmt(e.ts)} · {e.phase}</div>
            {e.publish && <span className="publish-badge">→ broadcast</span>}
            <div>{displayText.slice(0, 300)}</div>
            {e.concepts?.length > 0 && (
              <div className="bus-concepts">
                {e.concepts.slice(0, 5).map((c, j) => (
                  <span key={j} className="concept-tag">{c}</span>
                ))}
              </div>
            )}
          </div>
            );
          })}
      </div>
    </div>
  );
}

// ── Tool Log ──────────────────────────────────────────────────────────────────
function ToolLog({ events }) {
  const tools = events
    .filter(e => e.phase === "act" && e.action?.type && e.action.type !== "think")
    .slice(-200);
  const listRef = useRef(null);
  useEffect(() => {
    if (listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight;
  }, [tools.length]);

  return (
    <div className="tool-log">
      <div className="tool-log-header">Tool Use Log — {tools.length} actions</div>
      <div className="tool-list" ref={listRef}>
        {tools.map((e, i) => {
          const color = AGENT_COLORS[e.agent_id] || "#888";
          const t = e.action?.type || "?";
          return (
            <div key={i} className="tool-entry">
              <span className="tool-time">{fmt(e.ts)}</span>
              <span className="tool-agent" style={{ color }}>{e.agent_id}</span>
              <span className={`tool-type tool-${t === "install_skill" || t === "run_skill" ? "skill" : t === "run_script" ? "script" : "search"}`}>
                {t.replace("_", " ").toUpperCase()}
              </span>
              <span className="tool-summary">
                {(e.action?.query || e.action?.skill || e.thought || "").slice(0, 200)}
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Bus Feed ──────────────────────────────────────────────────────────────────
function BusFeed({ events, ws }) {
  const [msg, setMsg] = useState("");
  const published = events.filter(e => e.publish).slice(-200);
  const listRef = useRef(null);

  useEffect(() => {
    if (listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight;
  }, [published.length]);

  const inject = async () => {
    if (!msg.trim()) return;
    await fetch("/inject", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg }),
    });
    setMsg("");
  };

  return (
    <div className="bus-feed" style={{ display: "flex", flexDirection: "column", flex: 1, overflow: "hidden" }}>
      <div className="tool-log-header">Agent Bus — {published.length} broadcasts</div>
      <div style={{ flex: 1, overflowY: "auto" }} ref={listRef}>
        {published.map((e, i) => {
          const color = AGENT_COLORS[e.agent_id] || "#888";
          return (
            <div key={i} className="bus-entry">
              <span className="tool-time">{fmt(e.ts)}</span>
              <span className="bus-agent" style={{ color }}>{e.agent_id}</span>
              <div>
                <div className="bus-msg">{(e.publish || "").slice(0, 400)}</div>
                {e.concepts?.length > 0 && (
                  <div className="bus-concepts">
                    {e.concepts.slice(0, 8).map((c, j) => (
                      <span key={j} className="concept-tag">{c}</span>
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
      <div className="inject-bar">
        <input
          className="inject-input"
          placeholder="Inject a message into the collective..."
          value={msg}
          onChange={e => setMsg(e.target.value)}
          onKeyDown={e => e.key === "Enter" && inject()}
        />
        <button className="inject-btn" onClick={inject}>SEND</button>
      </div>
    </div>
  );
}

// ── Concept Force Graph ────────────────────────────────────────────────────────
function ConceptForceGraph({ graph }) {
  const svgRef = useRef(null);
  const simRef = useRef(null);

  useEffect(() => {
    if (!graph || !svgRef.current) return;
    const { nodes, edges } = graph;
    if (!nodes.length) return;

    const el  = svgRef.current;
    const W   = el.clientWidth || 800;
    const H   = el.clientHeight || 600;
    const svg = d3.select(el);
    svg.selectAll("*").remove();

    const g = svg.append("g");
    svg.call(d3.zoom().on("zoom", e => g.attr("transform", e.transform)));

    // Top 60 nodes by count
    const topNodes  = [...nodes].sort((a, b) => b.count - a.count).slice(0, 60);
    const nodeIds   = new Set(topNodes.map(n => n.id));
    const topEdges  = edges.filter(e => nodeIds.has(e.source) && nodeIds.has(e.target)).slice(0, 120);

    const maxCount  = Math.max(...topNodes.map(n => n.count), 1);
    const r         = d => 4 + (d.count / maxCount) * 16;

    // Agent colour blending
    const getNodeColor = (node) => {
      if (!node.agents?.length) return "#64748b";
      if (node.agents.length === 1) return AGENT_COLORS[node.agents[0]] || "#64748b";
      return "#e2e8f0"; // multi-agent = white
    };

    const link = g.append("g").selectAll("line")
      .data(topEdges).join("line")
      .attr("class", "link")
      .attr("stroke-width", d => Math.min(d.weight, 4));

    const node = g.append("g").selectAll("g")
      .data(topNodes).join("g").attr("class", "node")
      .call(d3.drag()
        .on("start", (event, d) => { if (!event.active) simRef.current?.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag",  (event, d) => { d.fx = event.x; d.fy = event.y; })
        .on("end",   (event, d) => { if (!event.active) simRef.current?.alphaTarget(0); d.fx = null; d.fy = null; })
      );

    node.append("circle")
      .attr("r",    d => r(d))
      .attr("fill", d => getNodeColor(d) + "33")
      .attr("stroke", d => getNodeColor(d))
      .attr("stroke-width", 1.5);

    node.append("text")
      .attr("dy", d => r(d) + 12)
      .attr("text-anchor", "middle")
      .attr("font-size", d => Math.min(11, 8 + (d.count / maxCount) * 5))
      .text(d => d.id.length > 18 ? d.id.slice(0, 16) + "…" : d.id);

    const sim = d3.forceSimulation(topNodes)
      .force("link",   d3.forceLink(topEdges).id(d => d.id).distance(80).strength(0.3))
      .force("charge", d3.forceManyBody().strength(-120))
      .force("center", d3.forceCenter(W / 2, H / 2))
      .force("collide", d3.forceCollide(d => r(d) + 6));

    simRef.current = sim;
    sim.on("tick", () => {
      link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      node.attr("transform", d => `translate(${d.x},${d.y})`);
    });

    return () => sim.stop();
  }, [graph]);

  return (
    <div className="map-container">
      <svg ref={svgRef}/>
      <div className="map-legend">
        {Object.entries(AGENT_COLORS).filter(([k]) => k !== "operator").map(([id, color]) => (
          <div key={id} className="map-legend-item">
            <div className="map-legend-dot" style={{ background: color }}/>
            <span style={{ color }}>{id}</span>
          </div>
        ))}
        <div className="map-legend-item">
          <div className="map-legend-dot" style={{ background: "#e2e8f0" }}/>
          <span style={{ color: "#e2e8f0" }}>shared</span>
        </div>
      </div>
    </div>
  );
}

// ── Heatmap ───────────────────────────────────────────────────────────────────
function Heatmap({ graph }) {
  const svgRef = useRef(null);

  useEffect(() => {
    if (!graph?.heatmap?.length || !svgRef.current) return;
    const el  = svgRef.current;
    const W   = el.clientWidth || 800;
    const H   = el.clientHeight || 400;
    const svg = d3.select(el);
    svg.selectAll("*").remove();

    const agents  = ["qwen", "glm", "llama", "deepseek"];
    const data    = graph.heatmap;
    const maxBucket = Math.max(...data.map(d => d.bucket), 1);
    const maxInt    = Math.max(...data.map(d => d.intensity), 1);

    const margin = { top: 20, right: 20, bottom: 40, left: 70 };
    const iW = W - margin.left - margin.right;
    const iH = H - margin.top - margin.bottom;

    const g    = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);
    const xScale = d3.scaleLinear().domain([0, maxBucket]).range([0, iW]);
    const yScale = d3.scaleBand().domain(agents).range([0, iH]).padding(0.05);
    const cellH  = yScale.bandwidth() / 3; // per concept row within agent

    // Y axis
    g.append("g").call(d3.axisLeft(yScale).tickSize(0))
      .selectAll("text").style("fill", "#94a3b8").style("font-size", "11px");
    g.select(".domain").attr("stroke", "#2a2a3a");

    // Cells
    data.forEach(d => {
      const agent  = d.agent_id;
      const color  = AGENT_COLORS[agent] || "#888";
      const x      = xScale(d.bucket);
      const y      = yScale(agent);
      const alpha  = 0.1 + (d.intensity / maxInt) * 0.9;
      const bW     = Math.max(2, iW / (maxBucket + 1) - 1);

      if (y === undefined) return;
      g.append("rect")
        .attr("x",      x)
        .attr("y",      y)
        .attr("width",  bW)
        .attr("height", yScale.bandwidth())
        .attr("fill",   color)
        .attr("opacity", alpha)
        .attr("rx",     1);
    });

    // X axis label
    svg.append("text")
      .attr("x", W / 2).attr("y", H - 5)
      .attr("text-anchor", "middle")
      .attr("fill", "#64748b")
      .attr("font-size", "10px")
      .text("Time (60s buckets) →");

  }, [graph]);

  return (
    <div style={{ flex: 1, overflow: "hidden", padding: "16px", display: "flex", flexDirection: "column" }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: "var(--muted)", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>
        Topic Focus Heatmap — Concept Intensity by Agent Over Time
      </div>
      <div style={{ flex: 1 }}>
        <svg ref={svgRef} style={{ width: "100%", height: "100%" }}/>
      </div>
    </div>
  );
}

// ── Divergence Map ────────────────────────────────────────────────────────────
function DivergenceMap({ graph }) {
  if (!graph?.divergence?.length) {
    return (
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "var(--muted)" }}>
        Divergence data will appear as agents agree and disagree...
      </div>
    );
  }

  // Group by agent pair
  const pairs = {};
  graph.divergence.forEach(d => {
    const key = `${d.agent_a} ↔ ${d.agent_b}`;
    if (!pairs[key]) pairs[key] = [];
    pairs[key].push(d);
  });

  return (
    <div className="divergence-container" style={{ overflowY: "auto" }}>
      {Object.entries(pairs).slice(0, 6).map(([pair, items]) => {
        const sorted = [...items].sort((a, b) => Math.abs(b.score) - Math.abs(a.score)).slice(0, 10);
        const maxVal = Math.max(...sorted.map(d => d.agree + d.disagree), 1);
        return (
          <div key={pair} className="divergence-pair">
            <div className="divergence-title">{pair}</div>
            {sorted.map((d, i) => {
              const agreeW    = (d.agree   / maxVal) * 50;
              const disagreeW = (d.disagree / maxVal) * 50;
              const scoreColor = d.score > 0 ? "#4ade80" : d.score < 0 ? "#f87171" : "#94a3b8";
              return (
                <div key={i} className="divergence-row">
                  <span className="divergence-concept">{d.concept}</span>
                  <div className="divergence-bar-wrap">
                    <div className="divergence-agree"    style={{ width: `${agreeW}%` }}/>
                    <div className="divergence-disagree" style={{ width: `${disagreeW}%` }}/>
                  </div>
                  <span className="divergence-score" style={{ color: scoreColor }}>
                    {d.score > 0 ? "+" : ""}{d.score}
                  </span>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ── Memory Viewer ─────────────────────────────────────────────────────────────
function MemoryViewer({ agentId, status }) {
  const memory = useMemory(agentId);
  const color  = AGENT_COLORS[agentId] || "#888";
  const model  = status?.agents?.[agentId]?.model || "";

  if (!memory) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%", color: "var(--muted)", fontSize: 11 }}>
      Loading memory...
    </div>
  );

  const renderMemory = (text) => {
    if (!text) return null;
    return text.split("\n").map((line, i) => {
      if (line.startsWith("## [")) return <div key={i} className="memory-tier">{line}</div>;
      if (line.startsWith("- ")) return <div key={i} className="memory-entry">{line}</div>;
      return <div key={i} style={{ color: "var(--muted)" }}>{line}</div>;
    });
  };

  return (
    <div className="memory-panel">
      <div className="agent-header">
        <div className="agent-dot" style={{ background: color }}/>
        <span className="agent-name" style={{ color }}>{agentId}</span>
        <span className="agent-model">{model}</span>
      </div>
      <div className="memory-body">{renderMemory(memory.core)}</div>
      {memory.counts && (
        <div className="tier-stats">
          {Object.entries(memory.counts).map(([tier, count]) => (
            <span key={tier} className="tier-stat">
              {tier.slice(0,3)}: <span className="tier-count">{count}</span>
            </span>
          ))}
        </div>
      )}
    </div>
  );
}

// ── GPU Monitor Panel ─────────────────────────────────────────────────────────
function GPUPanel() {
  const [gpu, setGpu] = useState(null);
  useEffect(() => {
    const poll = async () => {
      try { const r = await fetch("/gpu"); setGpu(await r.json()); } catch {}
    };
    poll();
    const t = setInterval(poll, 5000);
    return () => clearInterval(t);
  }, []);

  if (!gpu || gpu.status === "monitor_not_running") return (
    <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--muted)" }}>
      GPU monitor not running
    </div>
  );

  const levelColors = { NORMAL:"#10B981", WARM:"#F59E0B", HOT:"#EF4444", CRITICAL:"#7C3AED" };
  const levelColor  = levelColors[gpu.level] || "#888";

  return (
    <div style={{ flex:1, overflow:"auto", padding:16, display:"flex", flexDirection:"column", gap:16 }}>

      {/* Safeguard level */}
      <div style={{ background:"var(--bg2)", border:`1px solid ${levelColor}`, borderRadius:8, padding:"12px 16px", display:"flex", alignItems:"center", gap:12 }}>
        <div style={{ width:12, height:12, borderRadius:"50%", background:levelColor, boxShadow:`0 0 8px ${levelColor}` }}/>
        <span style={{ color:levelColor, fontWeight:700, fontSize:13, letterSpacing:1 }}>
          SAFEGUARD: {gpu.level}
        </span>
        {gpu.paused?.length > 0 && <span style={{ color:"#F59E0B", fontSize:11 }}>⏸ Paused: {gpu.paused.join(", ")}</span>}
        {gpu.stopped?.length > 0 && <span style={{ color:"#EF4444", fontSize:11 }}>■ Stopped: {gpu.stopped.join(", ")}</span>}
      </div>

      {/* Per-GPU stats */}
      <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
        {gpu.gpus?.map((g, i) => {
          const tempPct  = Math.min((g.temp_c / 100) * 100, 100);
          const tempColor = g.temp_c >= 92 ? "#7C3AED" : g.temp_c >= 85 ? "#EF4444" : g.temp_c >= 75 ? "#F59E0B" : "#10B981";
          const memColor  = g.mem_pct >= 95 ? "#7C3AED" : g.mem_pct >= 90 ? "#EF4444" : g.mem_pct >= 80 ? "#F59E0B" : "#10B981";
          return (
            <div key={i} style={{ background:"var(--bg2)", border:"1px solid var(--border)", borderRadius:8, padding:16, minWidth:280, flex:1 }}>
              <div style={{ fontWeight:700, marginBottom:12, color:"var(--text)" }}>GPU {g.index} — {g.name}</div>

              <div style={{ marginBottom:10 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                  <span style={{ color:"var(--muted)", fontSize:11 }}>Temperature</span>
                  <span style={{ color:tempColor, fontWeight:700 }}>{g.temp_c}°C</span>
                </div>
                <div style={{ height:8, background:"var(--bg3)", borderRadius:4, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${tempPct}%`, background:tempColor, borderRadius:4, transition:"width .5s" }}/>
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:9, color:"var(--muted)", marginTop:2 }}>
                  <span>0°C</span><span style={{color:"#F59E0B"}}>75°</span><span style={{color:"#EF4444"}}>85°</span><span style={{color:"#7C3AED"}}>92°</span><span>100°C</span>
                </div>
              </div>

              <div>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                  <span style={{ color:"var(--muted)", fontSize:11 }}>VRAM</span>
                  <span style={{ color:memColor, fontWeight:700 }}>{g.mem_pct}% ({(g.mem_used_mb/1024).toFixed(1)} / {(g.mem_total_mb/1024).toFixed(1)} GB)</span>
                </div>
                <div style={{ height:8, background:"var(--bg3)", borderRadius:4, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${g.mem_pct}%`, background:memColor, borderRadius:4, transition:"width .5s" }}/>
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:9, color:"var(--muted)", marginTop:2 }}>
                  <span>0%</span><span style={{color:"#F59E0B"}}>80%</span><span style={{color:"#EF4444"}}>90%</span><span style={{color:"#7C3AED"}}>95%</span><span>100%</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* History sparkline */}
      {gpu.history?.length > 1 && (
        <div style={{ background:"var(--bg2)", border:"1px solid var(--border)", borderRadius:8, padding:16 }}>
          <div style={{ fontSize:11, fontWeight:700, color:"var(--muted)", marginBottom:10, textTransform:"uppercase", letterSpacing:1 }}>
            Temperature History
          </div>
          <svg width="100%" height="60" style={{ overflow:"visible" }}>
            {(() => {
              const pts  = gpu.history.slice(-120);
              const maxT = Math.max(...pts.map(p => p.gpus?.[0]?.temp_c || 0), 100);
              const W    = 800; const H = 60;
              const x    = (i) => (i / (pts.length - 1)) * W;
              const y    = (t) => H - (t / maxT) * H;
              const path = pts.map((p, i) => `${i===0?"M":"L"}${x(i)},${y(p.gpus?.[0]?.temp_c||0)}`).join(" ");
              return (
                <>
                  <path d={path} fill="none" stroke="#EF4444" strokeWidth="1.5" vectorEffect="non-scaling-stroke"/>
                  {[75,85,92].map(t => (
                    <line key={t} x1="0" y1={y(t)} x2={W} y2={y(t)}
                          stroke={t===92?"#7C3AED":t===85?"#EF4444":"#F59E0B"}
                          strokeWidth="1" strokeDasharray="4,4" opacity="0.4"/>
                  ))}
                </>
              );
            })()}
          </svg>
        </div>
      )}
    </div>
  );
}


function App() {
  const wsUrl = `ws://${window.location.host}/ws`;
  const { events, connected } = useWebSocket(wsUrl);
  const status = useStatus();
  const graph  = useGraph();

  const [tab,    setTab]    = useState("streams");
  const [mapTab, setMapTab] = useState("graph");

  const agents = ["qwen", "glm", "llama", "deepseek"];

  const byAgent = (id) => events.filter(e => e.agent_id === id);
  const uptime  = status ? `${Math.floor(status.uptime_seconds / 60)}m ${Math.floor(status.uptime_seconds % 60)}s` : "—";

  return (
    <div id="root">
      {/* Header */}
      <div className="header">
        <h1>⬡ Agent Collective</h1>
        <span className={`badge ${connected ? "badge-green" : "badge-red"}`}>
          {connected ? "LIVE" : "RECONNECTING"}
        </span>
        {agents.map(id => {
          const running = status?.agents?.[id]?.running;
          return (
            <span key={id} className="badge" style={{
              background: (AGENT_COLORS[id] || "#888") + "20",
              color: AGENT_COLORS[id] || "#888",
              border: `1px solid ${AGENT_COLORS[id] || "#888"}44`,
            }}>
              {id} {running ? "▶" : "■"}
            </span>
          );
        })}
        <span className="uptime">
          {status?.concept_nodes || 0} concepts · {status?.bus_events || 0} events · uptime {uptime}
        </span>
      </div>

      {/* Tabs */}
      <div className="tabs">
        {["streams", "bus", "tools", "map", "memory", "gpu"].map(t => (
          <div key={t} className={`tab ${tab === t ? "active" : ""}`} onClick={() => setTab(t)}>
            {t === "streams" ? "🧠 Streams" : t === "bus" ? "📡 Bus" : t === "tools" ? "🔧 Tools" : t === "map" ? "🗺 Map" : t === "memory" ? "💾 Memory" : "🌡 GPU"}
          </div>
        ))}
      </div>

      {/* Content */}
      <div className="main">
        {tab === "streams" && (
          <div className="streams">
            {agents.map(id => (
              <AgentPanel key={id} agentId={id} agentEvents={byAgent(id)} status={status}/>
            ))}
          </div>
        )}

        {tab === "bus" && <BusFeed events={events} />}

        {tab === "tools" && <ToolLog events={events} />}

        {tab === "map" && (
          <div style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column" }}>
            <div className="tabs" style={{ borderTop: "none", borderBottom: "1px solid var(--border)", background: "var(--bg)" }}>
              {["graph", "heatmap", "divergence"].map(t => (
                <div key={t} className={`tab ${mapTab === t ? "active" : ""}`} onClick={() => setMapTab(t)}>
                  {t === "graph" ? "Concept Graph" : t === "heatmap" ? "Timeline Heatmap" : "Divergence Map"}
                </div>
              ))}
            </div>
            {mapTab === "graph"     && <ConceptForceGraph graph={graph}/>}
            {mapTab === "heatmap"   && <Heatmap graph={graph}/>}
            {mapTab === "divergence" && <DivergenceMap graph={graph}/>}
          </div>
        )}

        {tab === "memory" && (
          <div className="memory-grid">
            {agents.map(id => <MemoryViewer key={id} agentId={id} status={status}/>)}
          </div>
        )}
        {tab === "gpu" && <GPUPanel />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
